<!doctype html>
<!--
  store-shot.html — a 1600x900 store-preview composer for a TREK widget plugin.

  HOW TO USE
  1. Copy this file into your plugin as `client/harness.html`.
     (`trek-plugin dev` serves the whole client/ tree, so it appears at
      http://localhost:4317/ui/harness.html — same-origin with /api, no CORS.)
  2. Run `npx trek-plugin-sdk dev .`
  3. Edit the CONFIG block below: plugin name, tagline, feature pills, and the
     per-frame theme + mocked state your widget's route(s) return.
  4. Open http://localhost:4317/ui/harness.html and screenshot at 1600x900
     (e.g. Playwright: viewport 1600x900, deviceScaleFactor 1,
      page.screenshot({ path: 'docs/screenshot.png' })).
  5. !!! DELETE client/harness.html before `pack` !!! — `pack` zips the entire
     client/ tree, so a stray harness ships inside plugin.zip.

  This page is NOT under the plugin CSP (it's the host, not the frame), so it may
  use gradients/layout freely. It draws TREK-style card chrome around each widget
  frame for presentation — your real widget still renders chrome-free inside
  TREK's own card (see client-bridge.md §5).
-->
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Store shot</title>
<style>
  /* ── Palette: set --accent (+ --accent-2) to your plugin's brand (via CONFIG) ── */
  :root {
    --accent: #4f46e5;                 /* plugin brand — drives the background mesh + pills */
    --accent-2: #22d3ee;               /* a second, harmonising hue for the mesh */
    --font: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  /* The screenshot frame. Keep everything important inside .safe (centre ~1040px)
     so the 16:10 Discover-card crop never clips it. */
  body {
    width: 1600px; height: 900px; overflow: hidden;
    font-family: var(--font);
    display: flex; align-items: center; justify-content: center;
    background-color: #eef1f8;
    /* A colourful mesh built from the plugin's OWN accent hues — not a flat pastel. */
    background-image:
      radial-gradient(760px 520px at 6% -14%,  color-mix(in srgb, var(--accent) 62%, transparent), transparent 60%),
      radial-gradient(720px 560px at 100% 2%,  color-mix(in srgb, var(--accent-2) 58%, transparent), transparent 62%),
      radial-gradient(900px 760px at 64% 122%, color-mix(in srgb, var(--accent) 34%, transparent), transparent 60%),
      linear-gradient(150deg, #f5f7fd, #e8ecf7);
  }
  /* Optional subtle texture (CONFIG.pattern). Above the mesh, below the content. */
  body.pattern-dots::before, body.pattern-grid::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
  }
  body.pattern-dots::before {
    background-image: radial-gradient(rgba(255,255,255,.55) 1.3px, transparent 1.4px);
    background-size: 24px 24px; opacity: .5;
    -webkit-mask-image: linear-gradient(#000, transparent 78%);
            mask-image: linear-gradient(#000, transparent 78%);
  }
  body.pattern-grid::before {
    background-image:
      linear-gradient(color-mix(in srgb, var(--accent) 32%, transparent) 1px, transparent 1px),
      linear-gradient(90deg, color-mix(in srgb, var(--accent) 32%, transparent) 1px, transparent 1px);
    background-size: 44px 44px; opacity: .2;
    -webkit-mask-image: radial-gradient(1200px 700px at 50% 40%, #000, transparent 75%);
            mask-image: radial-gradient(1200px 700px at 50% 40%, #000, transparent 75%);
  }
  .safe { position: relative; z-index: 1; width: 1040px; text-align: center; }

  .title { font-size: 34px; font-weight: 700; color: #111827; letter-spacing: -0.02em; }
  .tagline { margin-top: 10px; font-size: 16px; font-weight: 500; color: #6b7280; }

  .cards { margin-top: 40px; display: flex; gap: 32px; justify-content: center; }

  /* Glassy tool card — mirrors the ≥3.2.1 PluginWidgets.tsx look (glass + --r-xl,
     uppercase title, no header border). */
  .card { width: 460px; border-radius: 20px; overflow: hidden; border: 1px solid;
          backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
  .card .head {
    padding: 16px 20px 8px; font-size: 12px; font-weight: 600; text-align: left;
    text-transform: uppercase; letter-spacing: 0.14em;
  }
  .card iframe { display: block; width: 100%; height: 180px; border: 0; background: transparent; }
  .card .badge { padding: 6px 0 0; font-size: 11px; font-weight: 600; letter-spacing: 0.06em;
                 text-transform: uppercase; color: #9ca3af; text-align: center; }

  /* Light glass */
  .card.light { background: rgba(255,255,255,0.72); border-color: rgba(255,255,255,0.6);
                box-shadow: 0 8px 30px rgba(0,0,0,.10), inset 0 1px 0 rgba(255,255,255,.6); }
  .card.light .head { color: #6b7280; }

  /* Dark glass */
  .card.dark { background: rgba(24,24,27,0.55); border-color: rgba(255,255,255,0.08);
               box-shadow: 0 8px 30px rgba(0,0,0,.40), inset 0 1px 0 rgba(255,255,255,.06); }
  .card.dark .head { color: #a1a1aa; }

  .pills { margin-top: 34px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .pill {
    padding: 8px 16px; border-radius: 999px; font-size: 13px; font-weight: 600;
    color: #374151; background: rgba(0,0,0,0.04);
    border: 1px solid color-mix(in srgb, var(--accent) 18%, transparent);
  }
</style>
</head>
<body>
  <div class="safe">
    <div class="title" id="title"></div>
    <div class="tagline" id="tagline"></div>
    <div class="cards" id="cards"></div>
    <div class="pills" id="pills"></div>
  </div>

<script>
  // ─────────────────────────────────────────────────────────────────────────
  // CONFIG — edit this. `state` is what your route(s) return via trek:invoke;
  // give the two frames different states to show the widget actually doing
  // something (e.g. plenty-of-time vs. departing-soon), one light + one dark.
  // ─────────────────────────────────────────────────────────────────────────
  const CONFIG = {
    uiUrl: '/ui',                       // the widget's own client bundle
    name: 'Your Plugin',
    tagline: 'One line on what it does and why it belongs on the dashboard.',
    pills: ['Membership-checked', 'Light & dark', 'No network', 'Zero setup'],
    // Make the background FIT THE PLUGIN: set accent (+ accent2) to its brand
    // hues — the mesh + pills derive from these. Pick colours that match what the
    // widget itself shows (e.g. a weather plugin → sky blue + sunset orange).
    accent: '#4f46e5',
    accent2: '#22d3ee',
    pattern: 'dots',                    // 'dots' | 'grid' | 'none' — subtle texture
    frameHeight: 180,                   // 180 = TREK sidebar slot; raise for taller widgets
    locale: 'en',
    frames: [
      { theme: 'light', label: 'Light', tripId: 1, state: { /* your GET /… payload */ } },
      { theme: 'dark',  label: 'Dark',  tripId: 1, state: { /* a different state */ } },
    ],
  }
  // ─────────────────────────────────────────────────────────────────────────

  // Apply the plugin's palette + texture to the background.
  if (CONFIG.accent)  document.documentElement.style.setProperty('--accent', CONFIG.accent)
  if (CONFIG.accent2) document.documentElement.style.setProperty('--accent-2', CONFIG.accent2)
  if (CONFIG.pattern && CONFIG.pattern !== 'none') document.body.classList.add('pattern-' + CONFIG.pattern)

  document.getElementById('title').textContent = CONFIG.name
  document.getElementById('tagline').textContent = CONFIG.tagline
  document.getElementById('pills').innerHTML =
    CONFIG.pills.map(p => `<span class="pill"></span>`).join('')
  document.querySelectorAll('.pill').forEach((el, i) => { el.textContent = CONFIG.pills[i] })

  // Build one column (card + theme label) per configured frame and register it.
  const frames = []   // { iframe, cfg }
  const cards = document.getElementById('cards')
  for (const cfg of CONFIG.frames) {
    const col = document.createElement('div')
    const card = document.createElement('div')
    card.className = 'card ' + (cfg.theme === 'dark' ? 'dark' : 'light')
    const head = document.createElement('div'); head.className = 'head'; head.textContent = CONFIG.name
    const iframe = document.createElement('iframe')
    iframe.src = CONFIG.uiUrl
    iframe.style.height = CONFIG.frameHeight + 'px'
    card.appendChild(head); card.appendChild(iframe); col.appendChild(card)
    if (cfg.label) {
      const badge = document.createElement('div'); badge.className = 'badge'; badge.textContent = cfg.label
      col.appendChild(badge)
    }
    cards.appendChild(col)
    frames.push({ iframe, cfg })
  }

  // Per-frame host bridge, keyed by e.source (each iframe's contentWindow).
  addEventListener('message', (e) => {
    const f = frames.find(fr => fr.iframe.contentWindow === e.source)
    if (!f) return
    const m = e.data; if (!m || typeof m !== 'object') return
    if (m.type === 'trek:ready' || m.type === 'trek:context:request') {
      e.source.postMessage({
        type: 'trek:context',
        tripId: f.cfg.tripId ?? null,
        userId: '1',
        theme: f.cfg.theme,
        locale: CONFIG.locale,
        hostOrigin: '*',
        // ≥3.2.1 fields the design kit reads. Add `tokens: {…}` for an exact
        // accent; omit it and the kit falls back to its baked default palette.
        appearance: { scheme: 'default', density: 'comfortable', reducedMotion: false, noTransparency: false },
      }, '*')
    } else if (m.type === 'trek:invoke') {
      // Reply to any of the widget's routes with this frame's mocked state.
      // Branch on m.sub here if your widget calls several routes.
      e.source.postMessage({ type: 'trek:response', requestId: m.requestId, data: f.cfg.state }, '*')
    } else if (m.type === 'trek:resize') {
      const h = Math.max(120, Math.min(Number(m.height) || CONFIG.frameHeight, 520))
      f.iframe.style.height = h + 'px'
    }
  })
</script>
</body>
</html>
